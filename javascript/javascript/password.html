<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password</title>
</head>
<body>

<h2>Verifikasi Password</h2>
<input type="password" id="p1" placeholder="Password">
<input type="password" id="p2" placeholder="Ulangi">
<button onclick="cek()">Cek</button>

<script>
function cek(){
    let p1 = document.getElementById("p1").value;
    let p2 = document.getElementById("p2").value;
    if(p1 === p2){
        alert("Cocok");
    } else {
        alert("Tidak cocok");
    }
}
</script>
</body>
</html>
