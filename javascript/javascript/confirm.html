<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm</title>
</head>
<body>

    <h2>Confirm Box</h2>
<button onclick="confirmBox()">Klik</button>

<script>
function confirmBox(){
    if(confirm("Yakin?")){
        alert("OK dipilih");
    } else {
        alert("Cancel dipilih");
    }
}
</script>

</body>
</html>
