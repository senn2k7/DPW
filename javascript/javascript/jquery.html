<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<h2>jQuery</h2>
<button id="hide">Hide</button>
<button id="show">Show</button>
<p id="text">Hello Huseinn</p>

<script>
$("#hide").click(function(){
    $("#text").hide();
});
$("#show").click(function(){
    $("#text").show();
});
</script>
</body>
</html>
