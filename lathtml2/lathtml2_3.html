<div id="content">
    <h2>Form Pendaftaran Mahasiswa Baru</h2>

    <form>

        <div>
            <label>Nama Lengkap</label><br>
            <input type="text" name="nama">
        </div>

        <div>
            <label>Tempat/Tanggal Lahir</label><br>
            <input type="text" name="tempat">
            <select name="tgl">
                <option>1</option>
                <option>2</option>
            </select>
            <select name="bln">
                <option>1</option>
                <option>2</option>
            </select>
            <select name="thn">
                <option>1989</option>
                <option>1990</option>
            </select>
        </div>

        <div>
            <label>Agama</label><br>
            <select name="agama">
                <option>-PILIH-</option>
                <option>Islam</option>
                <option>Kristen</option>
            </select>
        </div>

        <div>
            <label>Jenis Kelamin</label><br>
            <input type="radio" name="jk"> Laki-laki
            <input type="radio" name="jk"> Perempuan
        </div>

        <div>
            <label>Alamat Rumah</label><br>
            <textarea rows="4" cols="40"></textarea>
        </div>

        <div>
            <input type="submit" value="DAFTAR">
            <input type="reset" value="BATAL">
        </div>

        <p>
            No. Telp <br>
            <input type="text" name="telp">
        </p>

        <p>
            Nama Sekolah Asal <br>
            <input type="text" name="sekolah">
        </p>

        <p>
            Alamat Sekolah Asal <br>
            <textarea name="alamat_sekolah" rows="4" cols="40"></textarea>
        </p>

        <p>
            Jurusan Dipilih <br>
            <select name="jurusan">
                <option>-PILIH-</option>
                <option>Teknik Informatika</option>
                <option>Sistem Informasi</option>
                <option>Manajemen</option>
            </select>
        </p>

        <p>
            Tahu informasi ini dari : <br>
            <input type="checkbox" name="info" value="Koran"> Koran
            <input type="checkbox" name="info" value="Website"> Website
            <input type="checkbox" name="info" value="Televisi"> Televisi
            <input type="checkbox" name="info" value="Radio"> Radio
            <input type="checkbox" name="info" value="Teman"> Teman
        </p>

        <p>
            <input type="submit" value="DAFTAR">
            <input type="reset" value="BATAL">

    </form>
</div>
