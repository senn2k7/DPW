<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALAMAN HTML SAYA</title>
</head>
<body>
    <!-- Ordered List -->
    <ol type="1">
        <li>Jenis Buah :</li>
        <li>Jenis Makanan :</li>
        <li>Gender :</li>
    </ol>

    <!-- Unordered List -->
     <ul>
        <li>Apel</li>
        <li>Nanas</li>
        <li>Jeruk</li>
        <li>Anggur</li>
     </ul>

     <!-- Nested List -->
      <ol type="A">
        <li> Jenis Buah :
            <ul>
                <li>Apel</li>
                <li>Nanas</li>
            </ul>
        </li>
        <li>Jenis Makanan</li>
        <li>Gender :</li>
      </ol>
</body>
</html>
